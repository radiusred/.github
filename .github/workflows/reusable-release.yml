name: Reusable Release Template

on:
  workflow_call:
    inputs:
      approval_environment:
        type: string
        required: true
      merge_timeout_minutes:
        type: number
        required: false
        default: 60
    secrets:
      RELEASE_APP_CLIENT_ID:
        required: false
      RELEASE_APP_PRIVATE_KEY:
        required: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    outputs:
      bump_type: ${{ steps.calc.outputs.bump_type }}
      new_tag: ${{ steps.calc.outputs.new_tag }}
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID || 'Iv23liJJ7akrgLiP3Kti' }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Calculate Version
        id: calc
        uses: radiusred/.github/.github/actions/calculate_version@main

  gate:
    name: Approval Checkpoint
    needs: analyze
    runs-on: ubuntu-latest
    environment: ${{ inputs.approval_environment }}
    steps:
      - run: echo "Approved."

  execute:
    needs: [analyze, gate]
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID || 'Iv23liJJ7akrgLiP3Kti' }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Configure Git Identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect Existing Bump
        id: detect
        env:
          NEW_TAG: ${{ needs.analyze.outputs.new_tag }}
        run: |
          set -euo pipefail
          LAST_MSG=$(git log -1 --pretty=%s)
          if [ "$LAST_MSG" = "chore: release ${NEW_TAG}" ]; then
            echo "already_bumped=true" >> "$GITHUB_OUTPUT"
            echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "::notice::Release bump for ${NEW_TAG} already present on main; will tag and release directly."
          else
            echo "already_bumped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump Version on Release Branch
        if: steps.detect.outputs.already_bumped != 'true'
        id: bump
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_TAG: ${{ needs.analyze.outputs.new_tag }}
        run: |
          set -euo pipefail
          BRANCH="release/${NEW_TAG}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "::error::Release branch $BRANCH already exists on origin. Delete it and retry." >&2
            exit 1
          fi
          git checkout -b "$BRANCH"
          python3 - << 'PYEOF'
          import tomllib, re, os
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          version_file = data["tool"]["hatch"]["version"]["path"]
          new_ver = os.environ["NEW_TAG"].lstrip("v")
          content = open(version_file).read()
          new_content = re.sub(r'(__version__\s*=\s*")[^"]*(")', f'\\g<1>{new_ver}\\2', content)
          with open(version_file, "w") as f:
              f.write(new_content)
          PYEOF
          git add -A
          if git diff --cached --quiet; then
            echo "::error::Version file already at ${NEW_TAG} but main HEAD did not match expected bump commit. Manual intervention required." >&2
            exit 1
          fi
          git commit -m "chore: release ${NEW_TAG}"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Open Release PR
        if: steps.detect.outputs.already_bumped != 'true'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_TAG: ${{ needs.analyze.outputs.new_tag }}
          BRANCH: ${{ steps.bump.outputs.branch }}
        run: |
          set -euo pipefail
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: release ${NEW_TAG}" \
            --body "Automated release bump for ${NEW_TAG}. Reviewer: please rebase-merge once CI is green; the calling workflow will then tag and create the GitHub release.")
          PR_NUMBER=$(gh pr view "$PR_URL" --json number --jq .number)
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Wait for Merge
        if: steps.detect.outputs.already_bumped != 'true'
        id: wait
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          TIMEOUT_MINUTES: ${{ inputs.merge_timeout_minutes }}
        run: |
          set -euo pipefail
          MAX_ATTEMPTS=$(( TIMEOUT_MINUTES * 2 ))  # poll every 30s
          for i in $(seq 1 "$MAX_ATTEMPTS"); do
            STATE=$(gh pr view "$PR_NUMBER" --json state --jq .state)
            echo "attempt $i/$MAX_ATTEMPTS: state=$STATE"
            if [ "$STATE" = "MERGED" ]; then
              MERGE_SHA=$(gh pr view "$PR_NUMBER" --json mergeCommit --jq .mergeCommit.oid)
              echo "release_sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "$STATE" = "CLOSED" ]; then
              echo "::error::PR #$PR_NUMBER closed without merging" >&2
              exit 1
            fi
            sleep 30
          done
          echo "::error::PR #$PR_NUMBER did not merge within ${TIMEOUT_MINUTES} minutes. PR remains open for manual merge; re-run this workflow to tag and release once merged." >&2
          exit 1

      - name: Resolve Release SHA
        id: release_sha
        env:
          ALREADY_BUMPED: ${{ steps.detect.outputs.already_bumped }}
          EXISTING_SHA: ${{ steps.detect.outputs.release_sha }}
          MERGED_SHA: ${{ steps.wait.outputs.release_sha }}
        run: |
          if [ "$ALREADY_BUMPED" = "true" ]; then
            echo "sha=$EXISTING_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$MERGED_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync Main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Generate Release Notes
        id: notes
        if: hashFiles('cliff.toml') != ''
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --tag ${{ needs.analyze.outputs.new_tag }} --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_TAG: ${{ needs.analyze.outputs.new_tag }}
          TARGET_SHA: ${{ steps.release_sha.outputs.sha }}
        run: |
          set -euo pipefail
          if gh release view "$NEW_TAG" >/dev/null 2>&1; then
            echo "::notice::Release ${NEW_TAG} already exists; skipping create."
            exit 0
          fi
          if [ -s RELEASE_NOTES.md ]; then
            gh release create "$NEW_TAG" --target "$TARGET_SHA" --notes-file RELEASE_NOTES.md
          else
            gh release create "$NEW_TAG" --target "$TARGET_SHA" --generate-notes
          fi
