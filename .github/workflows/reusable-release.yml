name: Reusable Release Template

on:
  workflow_call:
    inputs:
      approval_environment:
        type: string
        required: true
    secrets:
      RELEASE_CLIENT_ID:
        required: true
      RELEASE_APP_PRIVATE_KEY:
        required: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    outputs:
      bump_type: ${{ steps.calc.outputs.bump_type }}
      new_tag: ${{ steps.calc.outputs.new_tag }}
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.RELEASE_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Calculate Version
        id: calc
        uses: radiusred/.github/.github/actions/calculate_version@main

  gate:
    name: Approval Checkpoint
    needs: analyze
    runs-on: ubuntu-latest
    environment: ${{ inputs.approval_environment }}
    steps:
      - run: echo "Approved."

  execute:
    needs: [analyze, gate]
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.RELEASE_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Bump Version and Push
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python3 - << 'EOF'
          import tomllib, re
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          version_file = data["tool"]["hatch"]["version"]["path"]
          new_ver = "${{ needs.analyze.outputs.new_tag }}".lstrip("v")
          content = open(version_file).read()
          new_content = re.sub(r'(__version__\s*=\s*")[^"]*(")', f'\\g<1>{new_ver}\\2', content)
          with open(version_file, "w") as f:
              f.write(new_content)
          EOF
          git add -A
          git commit -m "chore: release ${{ needs.analyze.outputs.new_tag }} [skip ci]"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git main

      - name: Generate Release Notes
        id: notes
        if: hashFiles('cliff.toml') != ''
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --tag ${{ needs.analyze.outputs.new_tag }} --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -s RELEASE_NOTES.md ]; then
            gh release create ${{ needs.analyze.outputs.new_tag }} --notes-file RELEASE_NOTES.md
          else
            gh release create ${{ needs.analyze.outputs.new_tag }} --generate-notes
          fi
